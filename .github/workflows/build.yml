name: build-juicy-bank-gem-and-macos

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (Linux)
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build ARMv8 (PocketBeagle 2 / Bela Stereo Gem) in Debian Bookworm container
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail

          docker run --rm --platform linux/arm64 \
            -v "$GITHUB_WORKSPACE:/work" -w /work \
            arm64v8/debian:bookworm bash -lc '
              set -euxo pipefail
              apt-get update
              apt-get install -y --no-install-recommends \
                build-essential make wget ca-certificates xz-utils file curl

              mkdir -p /tmp/pdsrc
              cd /tmp/pdsrc
              wget -qO pd.tar.gz https://github.com/pure-data/pure-data/archive/refs/tags/0.51-4.tar.gz
              tar -xzf pd.tar.gz
              export PDINC="/tmp/pdsrc/pure-data-0.51-4/src"

              cd /work
              make all CC=gcc PDINC="$PDINC"

              echo "---- file output ----"
              file build/**/juicy_bank~.pd_linux || true
            '

      - name: Upload ARMv8 artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: juicy_bank-bela-gem-armv8
          path: build/**/juicy_bank~.pd_linux

      - name: Fetch Pd headers (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p /tmp/pdsrc
          cd /tmp/pdsrc
          curl -L -o pd.tar.gz https://github.com/pure-data/pure-data/archive/refs/tags/0.51-4.tar.gz
          tar -xzf pd.tar.gz
          echo "PDINC=/tmp/pdsrc/pure-data-0.51-4/src" >> "$GITHUB_ENV"

      - name: Build (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euxo pipefail
          make all PDINC="$PDINC"

      - name: Upload macOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: juicy_bank-macos-universal
          path: build/**/juicy_bank~.pd_darwin
